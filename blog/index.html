---
layout: _baseTemplate.njk
title: DoubleL Press
---

<article class="index">
	{%- for post in collections.blog -%}
	<div class="snippet">
		<a class="heading fancy-link" href="{{ post.page.url }}"
			>{{ post.data.title }}</a
		>
		<p class="post-date">{{ post.page.date | eloquent-date }}</p>
		<p class="description">{{post.data.description}}</p>
	</div>
	{%- endfor -%}
</article>
